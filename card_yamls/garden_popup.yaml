type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#garden'
    name: Garden
    show_icon: true
    force_icon: false
    show_state: false
    show_last_changed: false
    show_attribute: false
    icon: mdi:grass
    sub_button:
      - entity: sensor.main_floor_thermostat_outdoor_temperature
        show_state: true
        state_background: false
        show_last_changed: false
    styles: |
      .bubble-button-card-container {
        background: green !important;
      }
    width_desktop: 840px
  - type: custom:bubble-card
    card_type: separator
    name: Controls
    icon: mdi:water-pump
  - type: horizontal-stack
    cards:
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            name: Smart Hose
            icon: ''
            show_state: true
            entity: switch.smart_hose_tap_timer_zone
            styles: ''
            use_accent_color: false
            sub_button:
              - entity: sensor.smart_hose_tap_timer_battery_level
                show_state: true
                show_attribute: false
                state_background: false
              - entity: sensor.smart_hose_current_consumption
                show_state: true
                state_background: false
                show_icon: true
                show_background: false
                icon: mdi:water
            card_layout: large-2-rows
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            name: Smart Watering
            icon: mdi:brain
            show_state: true
            show_attribute: false
            attribute: run_times
            force_icon: false
            entity: switch.smart_hose_smart_watering_program_2
            show_last_changed: false
            card_layout: normal
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            name: Program A
            icon: ''
            show_state: true
            show_attribute: false
            force_icon: false
            entity: switch.smart_hose_main_program_program
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            name: Rain Delay
            icon: ''
            show_state: false
            show_attribute: true
            attribute: started_at
            force_icon: false
            entity: switch.smart_hose_tap_timer_rain_delay
          - type: custom:bubble-card
            card_type: button
            button_type: state
            name: Next Watering
            icon: mdi:water
            show_state: true
            force_icon: false
            entity: sensor.smart_hose_next_start_time
          - type: custom:bubble-card
            card_type: separator
            name: Statistics
            icon: mdi:graph
          - type: horizontal-stack
            cards:
              - type: custom:bubble-card
                button_type: state
                name: Last
                icon: mdi:water
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
                slider_live_update: true
                sub_button: []
                card_type: button
                entity: sensor.smart_hose_last_consumption
                show_last_changed: false
                show_icon: false
              - type: custom:bubble-card
                button_type: state
                name: Total
                icon: mdi:water-opacity
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
                slider_live_update: true
                sub_button: []
                card_type: button
                entity: sensor.smart_hose_total_consumption
                show_last_changed: false
                show_icon: false
                show_name: true
      - show_state: false
        show_name: false
        camera_view: live
        type: picture-entity
        theme: macOS Theme
        camera_image: camera.front_door_fluent
        entity: camera.front_door_fluent
grid_options:
  rows: auto