views:
  - type: sections
    subview: false
    icon: mdi:cellphone
    title: Home
    path: mobile-main
    header: !include card_yamls/header.yaml
    badges:
      - !include card_yamls/header_badges.yaml
    cards: []
    max_columns: 3
    dense_section_placement: true
    theme: HaCasa

    background:
      opacity: 33
      alignment: center
      size: cover
      repeat: repeat
      attachment: fixed
    sections:
      - type: grid #thermostats
        cards:
          - type: custom:bubble-card
            card_type: separator
            name: Thermostats
            icon: mdi:thermostat
            card_layout: large
          - type: custom:bubble-card
            card_type: climate
            entity: climate.upstairs_thermostat
            sub_button:
              - name: HVAC modes menu
                select_attribute: hvac_modes
                state_background: false
                show_arrow: false
                show_name: false
                show_last_changed: false
                show_state: false
              - entity: climate.upstairs_thermostat
                select_attribute: preset_modes
                name: Preset Modes
                icon: mdi:arrow-u-right-bottom
                show_name: false
                show_state: false
                show_attribute: false
                attribute: preset_mode
                state_background: false
                show_background: true
                show_arrow: true
            scrolling_effect: true
            force_icon: false
            show_icon: false
            show_name: true
            show_state: false
            show_attribute: true
            attribute: current_temperature
            hide_target_temp_low: false
            hide_target_temp_high: false
            state_color: false
            card_layout: large
            styles: |-
              * {
              --bubble-border-radius: 10px
              }
            name: Upstairs
            grid_options:
              columns: 12
              rows: 1
          - type: custom:bubble-card
            card_type: climate
            entity: climate.main_floor_thermostat
            sub_button:
              - name: HVAC modes menu
                select_attribute: hvac_modes
                state_background: false
                show_arrow: false
                show_name: false
                show_last_changed: false
                show_state: false
              - entity: climate.main_floor_thermostat
                select_attribute: preset_modes
                name: Preset Modes
                icon: mdi:arrow-u-right-bottom
                show_name: false
                show_state: false
                show_attribute: false
                attribute: preset_mode
                state_background: false
                show_background: true
                show_arrow: true
            scrolling_effect: true
            force_icon: false
            show_icon: false
            show_name: true
            show_state: false
            show_attribute: true
            attribute: current_temperature
            hide_target_temp_low: false
            hide_target_temp_high: false
            state_color: false
            card_layout: large
            styles: |-
              * {
              --bubble-border-radius: 10px
              }
            name: Downstairs
      - type: grid #controls
        cards:
          - type: custom:bubble-card
            card_type: separator
            name: Controls
            icon: mdi:toggle-switch
            card_layout: large
          - type: custom:vertical-stack-in-card
            cards:
              - type: custom:bubble-card
                card_type: separator
                name: Kitchen
                sub_button:
                  - entity: sensor.kitchen_temp_temperature
                    show_background: false
                    show_icon: false
                    show_state: true
                  - show_icon: true
                    show_state: true
                    state_background: false
                    icon: mdi:menu
                    tap_action:
                      action: navigate
                      navigation_path: '#kitchen'
                styles: |
                  * {
                   .bubble-line {
                          flex-grow: 1;
                          margin-right: 0px;
                          }
              - type: custom:bubble-card
                card_type: separator
                icon: mdi:fridge
                card_layout: normal
                styles: |
                  * {
                  --bubble-line-background-color: none
                  }
                    .bubble-icon {
                      color: lightblue !important;
                      --mdc-icon-size: 65px !important;
                      margin: 0 5px 0 5px;
                    }
                     .bubble-sub-button-icon {
                      --mdc-icon-size: 30px !important;
                    }
                     .bubble-sub-button {
                      height: 30px !important;
                      min-width: 2px !important;
                      border-radius: 12px;
                    }
                   .bubble-line {
                          flex-grow: 0;
                          margin-right: 0px;
                          }
                sub_button:
                  - entity: light.kitchen_group
                    show_background: true
                    show_name: false
                    tap_action:
                      action: toggle
                    hold_action:
                      action: more-info
                    icon: mdi:ceiling-light-multiple
                    name: Kitchen Lights
                  - entity: cover.kitchen_windows
                    show_background: true
                    show_name: false
                    tap_action:
                      action: more-info
                    hold_action:
                      action: more-info
                    icon: mdi:window-closed
                    state_background: false
                    show_last_changed: false
            grid_options:
              columns: 6
              rows: auto
