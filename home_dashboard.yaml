                      "installation_angle"]?.state ?? 0);
                      vars.installation_angle_cos = Math.cos(Math.PI/180 *
                      vars.installation_angle); vars.installation_angle_sin =
                      Math.sin(Math.PI/180 * vars.installation_angle);
                      vars.max_distance = 10 *
                      hass.states[vars.number_name_prefix +
                      "max_distance"].state; var distance_ratio =
                      vars.max_distance/7500; var coverage_steps =
                      [5500,4500,4000,3000,2000,1000,0,-1000,-2000,-3000,-4000,-4500,-5500];

                      vars.coverage_x = [0, vars.max_distance *
                      Math.sin(Math.PI/180 * 60)]; coverage_steps.forEach((step)
                      => vars.coverage_x.push(step * distance_ratio));
                      vars.coverage_x.push(-vars.max_distance *
                      Math.sin(Math.PI/180 * 60), 0);

                      vars.coverage_y = [0, vars.max_distance *
                      Math.cos(Math.PI/180 * 60)]; coverage_steps.forEach((step)
                      => {
                        return vars.coverage_y.push(Math.sqrt(vars.max_distance**2 - (step * distance_ratio)**2));
                      }); vars.coverage_y.push(vars.max_distance *
                      Math.cos(Math.PI/180 * 60), 0); return
