views:
  - type: sections
    subview: false
    icon: mdi:cellphone
    badges:
      - type: custom:mushroom-chips-card
        chips:
          - type: alarm-control-panel
            entity: alarm_control_panel.home
            content_info: state
          - type: weather
            entity: weather.forecast_home
            show_conditions: true
            show_temperature: true
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.family_room_person
                state_not: 'off'
            chip:
              type: entity
              entity: binary_sensor.family_room_person
              use_entity_picture: true
              icon_color: red
              icon: mdi:sofa
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.front_door_package
                state_not: 'off'
            chip:
              type: entity
              entity: binary_sensor.front_door_package
              icon_color: blue
              icon: mdi:garage
              use_entity_picture: true
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.front_door_person
                state_not: 'off'
            chip:
              type: entity
              entity: binary_sensor.front_door_person
              icon: mdi:doorbell-video
              icon_color: red
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.entry_motion
                state_not: 'off'
            chip:
              type: entity
              entity: binary_sensor.entry_motion
              icon: mdi:door
              icon_color: red
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.office_person
                state_not: 'off'
            chip:
              type: entity
              entity: binary_sensor.office_person
              icon: mdi:desktop-tower-monitor
              icon_color: red
          - type: conditional
            conditions:
              - condition: state
                entity: lock.lock_front_door
                state_not: locked
            chip:
              type: entity
              entity: lock.lock_front_door
              use_entity_picture: true
              icon_color: red
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.front_door_opening
                state_not: 'off'
            chip:
              type: entity
              entity: binary_sensor.front_door_opening
              icon: mdi:door-open
              icon_color: red
              use_entity_picture: false
              name: Front Door
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.britney_meds_toggle
                state: 'on'
            chip:
              type: template
              tap_action:
                action: toggle
              entity: input_boolean.britney_meds_toggle
              icon: mdi:pill-multiple
              icon_color: red
              hold_action:
                action: none
              double_tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.britney_meds_toggle
                state: 'off'
            chip:
              type: template
              tap_action:
                action: perform-action
                perform_action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.britney_meds_toggle
              hold_action:
                action: none
              double_tap_action:
                action: none
              entity: input_boolean.britney_meds_toggle
              icon: mdi:pill-multiple
              icon_color: green
        alignment: center
    cards: []
    title: Mobile
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: custom:bubble-card
            card_type: separator
            name: Thermostats
            icon: mdi:thermostat
            card_layout: large
          - type: custom:bubble-card
            card_type: climate
            entity: climate.upstairs_thermostat
            sub_button:
              - name: HVAC modes menu
