          #################################################
          # Weather
          #################################################
          - type: custom:weather-card
            entity: weather.forecast_home
            current: true
            details: true
            show_forecast: true
            forcast_type: hourly
            card_mod:
              style: |
                :host {
                  transform: translate( 0, 0 );
                  position: absolute;
                  width: 240px;
                  left: 6px;
                  top: 22px;
                  opacity: 0.7;
                  mix-blend-mode: luminosity;
                }
                @media only screen and (max-width: 1280px)
                {
                    :host {
                        left: -22px;
                        top: 10px;
                    }
                }
                ha-card {
                  background: none;
                  box-shadow: none;
                }
                :host .icon.bigger {
                  position: unset;
                  width: 8em;
                  height: 8em;
                  margin-top: -1em;
                }
                .temp, .tempc, .icon {
                    position: unset !important;
                }
                :host .temp {
                    font-size: 2.5em !important;
                    margin-left: 0em;
                }
                :host .current {
                  --primary-text-color:rgb(36, 35, 35);
                }
                :host .variations {
                  --primary-text-color:rgb(36, 35, 35);
                }
                .tempc {
                    font-size: 2.5em !important;
                    vertical-align: super;
                }