views:
  - title: Fahmy House
    path: fahmy_house
    icon: mdi:floor-plan
    theme: floorplan-theme
    cards:
      - type: horizontal-stack
        cards:

        #################################################
        # Battery States
        #################################################
          - type: custom:mod-card
            card_mod:
              style: |
                  :host {
                    position: absolute;
                    bottom: 6px;
                    right: 6px;
                    width: 265px;
                  }
            card:
              type: custom:auto-entities
              show_empty: false
              filter:
                include:
                  - entity_id: '/sensor\..*battery/'
                    state: "< 75"
                exclude:
                  # - entity_id: '/sensor\..*phone/'
                  - entity_id: '/sensor\.quest_2*/'
                  - entity_id: '/sensor\.panel_*/'
                  - entity_id: '/sensor\..*_browser_*/'
                  - attributes:
                      show_battery_alert: false
              card:
                type: entities
                theme: none
                card_mod:
                  style: |
                    @keyframes alert {
                      from {
                        background: #ff000033;
                        box-shadow: 0px 0px 0px 1px #f970709e;
                      }
                      to {
                        background: #ff000011;
                        box-shadow: 0px 0px 0px 1px #f9707055;
                      }
                    }
                    ha-card {
                      background: #ffffff14;
                      height: auto !important;
                      transform: translate( 0, 0 );

                      animation: 1s alert linear infinite alternate;
                      box-shadow: 0px 0px 0px 1px #f970709e;
                      background: #ff000033;
                    }

        #################################################
        # Floor Plan
        #################################################
          - type: custom:floorplan-card
            card_mod:
              style: >
                ha-card {
                    max-width: 200vh;
                    margin: 20px auto;
                    transform: scale(1.00);
                    background: none;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                }

            config:
              image: '/local/floorplans/floorplan_optimized.svg'
              cache: false
              mobile-image: '/local/floorplans/floorplan_optimized.svg'
              stylesheet: '/local/floorplans/floorplan.css'
              defaults:
                # tap_action: toggle
                hover_action: hover-info
                double_click_action: more-info
                hover_info_filter:
                  - min_mireds
                  - max_mireds
                  - icon
                  - order
                  - color_mode
                  - min_temp
                  - max_temp
                  - hvac_modes
                  - fan_modes
                  - preset_modes
                  - target_temp_high
                  - target_temp_low
                  - supported_features
                  - friendly_name
                  - supported_color_modes
                  - device_id
                  - zone_id
                  - device_class
                  - unit_of_measurement
                  - state_class


              rules:
                - name: Thermostat Target Temperature
                  entities:
                    - sensor.upstairs_thermostat_target_temperature
                    - sensor.main_floor_thermostat_target_temperature
                  state_action:
                    - service: floorplan.text_set
                      service_data: '${(entity.state !== undefined) ? "Target: " + Math.round(entity.state * 10) / 10 + " °F" : "unknown"}'
                    - service: floorplan.class_set
                      service_data:
                        class: 'static-temp'

                - name: Thermostat Indoor Temperature
                  entities:
                    - sensor.upstairs_thermostat_indoor_temperature
                    - sensor.main_floor_thermostat_indoor_temperature
                  state_action:
                    - service: floorplan.text_set
                      service_data: '${(entity.state !== undefined) ? "Indoor: " + Math.round(entity.state * 10) / 10 + " °F" : "unknown"}'
                    - service: floorplan.class_set
                      service_data:
                        class: 'static-temp'

                - name: Temperature
                  entities:
                    - sensor.family_room_temp_temperature
                    - sensor.kitchen_temp_temperature
                    - sensor.guest_room_temp_temperature
                    - sensor.baby_room_temp_temperature
                    - sensor.master_bedroom_temp_temperature
                    - sensor.office_temp_temperature
                  state_action:
                    - service: floorplan.text_set
                      service_data: '${(entity.state !== undefined) ? Math.round(entity.state * 10) / 10 + " °F" : "unknown"}'
                    - service: floorplan.class_set
                      service_data:
                        class: 'static-temp'

                - name: Humidity
                  entities:
                    - sensor.family_room_temp_humidity
                    - sensor.kitchen_temp_humidity
                    - sensor.guest_room_temp_humidity
                    - sensor.baby_room_temp_humidity
                    - sensor.master_bedroom_temp_humidity
                    - sensor.office_temp_humidity
                  state_action:
                    - service: floorplan.text_set
                      service_data: '${(entity.state !== undefined) ? Math.round(entity.state * 10) / 10 + " %" : "unknown"}'
                    - service: floorplan.class_set
                      service_data:
                        class: 'static-humidity'

                - entity: binary_sensor.fridge_on
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: "LG Fridge"
                        size: normal
                        dissmisable: true
                        card_mod:
                          style: |
                            :host {
                              opacity: 0.85;
                              mix-blend-mode: luminosity;
                            }
                        content:
                          type: custom:auto-entities
                          card:
                            type: entities
                          filter:
                            include:
                              - entity_id: '/sensor\..*_fridge/'
                              - entity_id: '/binary_sensor\..*fridge/'
                            exclude:
                              - entity_id: '/sensor\..*cost/'
                          sort:
                            method: entity_id
                            ignore_case: true

                - entities:
                    - binary_sensor.whirlpool_dishwasher_on
                    - binary_sensor.whirlpool_washing_machine_on
                  state_action:
                    action: call-service
                    service: floorplan.class_set
                    service_data: '${(entity.state === "off") ? "appliance-off" : "appliance-on"}'

                - entity:
                    - binary_sensor.whirlpool_washing_machine_on
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: "Whirlpool Washing Machine"
                        size: normal
                        dissmisable: true
                        card_mod:
                          style: |
                            :host {
                              opacity: 0.85;
                              mix-blend-mode: luminosity;
                            }
                        content:
                          type: custom:auto-entities
                          card:
                            type: entities
                            theme: Caule Black Blue Glass
                          filter:
                            include:
                              - entity_id: '/sensor\..*whirlpool_washing_machine*/'
                            exclude:
                              - entity_id: '/sensor\..*cost/'
                          sort:
                            method: entity_id
                            ignore_case: true

                - entity:
                    - binary_sensor.whirlpool_dishwasher_on
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: "Whirlpool Dishwasher"
                        size: normal
                        dissmisable: true
                        card_mod:
                          style: |
                            :host {
                              opacity: 0.85;
                              mix-blend-mode: luminosity;
                            }
                        content:
                          type: custom:auto-entities
                          card:
                            type: entities
                          filter:
                            include:
                              - entity_id: '/sensor\..*whirlpool_dishwasher*/'
                            exclude:
                              - entity_id: '/sensor\..*cost/'
                          sort:
                            method: entity_id
                            ignore_case: true

                - entity: media_player.samsung_q80aa_65_tv
                  state_action:
                    action: call-service
                    service: floorplan.class_set
                    service_data: '${(entity.state === "off") ? "media-player-off" : "media-player-on"}'

                  hold_action: more-info
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: Samsung Q80
                        size: normal
                        dissmisable: true
                        card_mod:
                          style: |
                            :host {
                              opacity: 0.85;
                              mix-blend-mode: luminosity;
                              aspect-ratio: 1;
                            }
                        content:
                          type: vertical-stack
                          grid_options:
                            columns: 12
                            rows: auto
                          cards:
                            - type: horizontal-stack
                              cards:
                                - type: custom:mini-media-player
                                  entity: media_player.sonos
                                  volume_stateless: false
                                  group: true
                                  layout:
                                    columns: auto
                                    rows: auto
                                  hide:
                                    name: true
                                    icon: true
                                    power: true
                                    source: true
                                    volume: false
                                    info: false
                                    prev: true
                                    play_pause: false
                                    next: true
                                  toggle_power: true
                                  artwork: full-cover
                                  sound_mode: full
                                  info: short
                                  replace_mute: default
                                - type: custom:mini-media-player
                                  entity: media_player.samsung_q80aa_65_tv
                                  name: Samsung TV
                                  volume_stateless: false
                                  group: true
                                  hide:
                                    volume: true
                                    source: true
                                    name: true
                                    icon: true
                                    power: false
                            - type: grid
                              square: true
                              columns: 3
                              card_mod:
                                style: |
                                  :host {
                                    aspect-ratio: 1/1;
                                  }
                              cards:
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: toggle
                                  entity: media_player.samsung_q80aa_65_tv
                                  name: Power
                                  icon: mdi:power
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: remote.send_command
                                    target:
                                      device_id: 7dc5c1afe19ff69babc531051adebdf7
                                    data:
                                      num_repeats: 1
                                      delay_secs: 0.4
                                      hold_secs: 0
                                      command: KEY_UP
                                  entity: remote.samsung_q80aa_65_tv
                                  name: Up
                                  icon: mdi:arrow-up-bold
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: remote.send_command
                                    target:
                                      device_id: 7dc5c1afe19ff69babc531051adebdf7
                                    data:
                                      num_repeats: 1
                                      delay_secs: 0.4
                                      hold_secs: 0
                                      command: KEY_HDMI
                                  entity: remote.samsung_q80aa_65_tv
                                  name: Source
                                  icon: mdi:remote-desktop
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: remote.send_command
                                    target:
                                      device_id: 7dc5c1afe19ff69babc531051adebdf7
                                    data:
                                      num_repeats: 1
                                      delay_secs: 0.4
                                      hold_secs: 0
                                      command: KEY_LEFT
                                  entity: remote.samsung_q80aa_65_tv
                                  name: Left
                                  icon: mdi:arrow-left-bold
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: remote.send_command
                                    target:
                                      device_id: 7dc5c1afe19ff69babc531051adebdf7
                                    data:
                                      num_repeats: 1
                                      delay_secs: 0.4
                                      hold_secs: 0
                                      command: KEY_ENTER
                                  entity: remote.samsung_q80aa_65_tv
                                  name: Enter
                                  icon: mdi:keyboard-return
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: remote.send_command
                                    target:
                                      device_id: 7dc5c1afe19ff69babc531051adebdf7
                                    data:
                                      num_repeats: 1
                                      delay_secs: 0.4
                                      hold_secs: 0
                                      command: KEY_RIGHT
                                  entity: remote.samsung_q80aa_65_tv
                                  name: Right
                                  icon: mdi:arrow-right-bold
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: media_player.volume_down
                                    target:
                                      entity_id: media_player.sonos
                                  entity: media_player.sonos
                                  name: Volume Down
                                  icon: mdi:volume-minus
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: remote.send_command
                                    target:
                                      device_id: 7dc5c1afe19ff69babc531051adebdf7
                                    data:
                                      num_repeats: 1
                                      delay_secs: 0.4
                                      hold_secs: 0
                                      command: KEY_DOWN
                                  entity: remote.samsung_q80aa_65_tv
                                  name: Down
                                  icon: mdi:arrow-down-bold
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: media_player.volume_up
                                    target:
                                      entity_id: media_player.sonos
                                  entity: media_player.sonos
                                  name: Volume Up
                                  icon: mdi:volume-plus
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: remote.send_command
                                    target:
                                      device_id: 7dc5c1afe19ff69babc531051adebdf7
                                    data:
                                      num_repeats: 1
                                      delay_secs: 0.4
                                      hold_secs: 0
                                      command: KEY_BACK
                                  entity: remote.samsung_q80aa_65_tv
                                  name: Home
                                  icon: mdi:backup-restore
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: remote.send_command
                                    target:
                                      device_id: 7dc5c1afe19ff69babc531051adebdf7
                                    data:
                                      num_repeats: 1
                                      delay_secs: 0.4
                                      hold_secs: 0
                                      command: KEY_HOME
                                  entity: remote.samsung_q80aa_65_tv
                                  name: Home
                                  icon: mdi:home
                                  show_state: false
                                - type: custom:button-card
                                  show_name: false
                                  show_icon: true
                                  size: 100px
                                  tap_action:
                                    action: perform-action
                                    perform_action: remote.send_command
                                    target:
                                      device_id: 7dc5c1afe19ff69babc531051adebdf7
                                    data:
                                      num_repeats: 1
                                      delay_secs: 0.4
                                      hold_secs: 0
                                      command: KEY_PLAY
                                  entity: remote.samsung_q80aa_65_tv
                                  name: Play/Pause
                                  icon: mdi:play-pause
                                  show_state: false

                - entity: climate.main_floor_thermostat
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: "Thermostat"
                        size: normal
                        dissmisable: true
                        card_mod:
                          style: |
                            :host {
                              opacity: 0.95;
                              mix-blend-mode: normal;
                            }
                        content:
                          type: thermostat
                          entity: climate.main_floor_thermostat
                          scan_interval: 60
                          features:
                            - type: target-temperature
                            - style: icons
                              type: climate-hvac-modes
                              hvac_modes:
                                - "off"
                                - heat
                                - cool
                            - style: icons
                              type: climate-fan-modes
                              fan_modes:
                                - diffuse
                                - "on"
                                - auto
                            - style: dropdown
                              type: climate-preset-modes
                              preset_modes:
                                - NoHold
                                - HoldUntil
                            - type: custom:service-call
                              entries:
                                - type: button
                                  entity_id: sensor.template_downstairs_thermostat_power
                                  value_attribute: State
                                  icon: mdi:lightning-bolt
                                  label: "{{ (value/1000) | float(0) }} kW"
                                  unit_of_measurement: kW
                                - type: button
                                  entity_id: sensor.downstairs_thermostat_energy
                                  icon: mdi:flash
                                  label: "{{ (value/1000) | int }} kW"
                          name: Downstairs
                          show_current_as_primary: true

                  state_action:
                    service: floorplan.class_set
                    service_data: |
                      >
                      if( entity.state === "heat" && entity.attributes.hvac_action === "heating")
                        return "heat-on";
                      if( entity.state === "heat" && entity.attributes.hvac_action === "idle")
                        return "heat-off";
                      if( entity.state === "cool" && entity.attributes.hvac_action === "cooling")
                        return "cool-on";
                      if( entity.state === "heat" && entity.attributes.hvac_action === "idle")
                        return "cool-off";
                      return "off";

                - entity: climate.upstairs_thermostat
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: "Thermostat"
                        size: normal
                        dissmisable: true
                        card_mod:
                          style: |
                            :host {
                              opacity: 0.95;
                              mix-blend-mode: normal;
                            }
                        content:
                          type: thermostat
                          entity: climate.upstairs_thermostat
                          scan_interval: 60
                          features:
                            - type: target-temperature
                            - style: icons
                              type: climate-hvac-modes
                              hvac_modes:
                                - "off"
                                - heat
                                - cool
                            - style: icons
                              type: climate-fan-modes
                              fan_modes:
                                - diffuse
                                - "on"
                                - auto
                            - style: dropdown
                              type: climate-preset-modes
                              preset_modes:
                                - NoHold
                                - HoldUntil
                            - type: custom:service-call
                              entries:
                                - type: button
                                  entity_id: sensor.template_upstairs_thermostat_power
                                  value_attribute: State
                                  icon: mdi:lightning-bolt
                                  label: "{{ (value/1000) | float(0) }} kW"
                                  unit_of_measurement: kW
                                - type: button
                                  entity_id: sensor.upstairs_thermostat_energy
                                  icon: mdi:flash
                                  label: "{{ (value/1000) | int }} kW"
                          name: Downstairs
                          show_current_as_primary: true
                  state_action:
                    service: floorplan.class_set
                    service_data: |
                      >
                      if( entity.state === "heat" && entity.attributes.hvac_action === "heating")
                        return "heat-on";
                      if( entity.state === "heat" && entity.attributes.hvac_action === "idle")
                        return "heat-off";
                      if( entity.state === "cool" && entity.attributes.hvac_action === "cooling")
                        return "cool-on";
                      if( entity.state === "heat" && entity.attributes.hvac_action === "idle")
                        return "cool-off";
                      return "off";

                - entities:
                  - binary_sensor.entrance_occupancy
                  - binary_sensor.entry_motion
                  - binary_sensor.family_room_motion
                  state_action:
                    service: floorplan.class_set
                    service_data: '${(entity.state === "on") ? "motion-on" : "motion-off"}'

                - entities:
                    - sensor.guest_room_temp_temperature
                    - sensor.guest_room_temp_humidity
                    - sensor.family_room_temp_temperature
                    - sensor.family_room_temp_humidity
                    - sensor.office_temp_temperature
                    - sensor.office_temp_humidity
                    - sensor.master_bedroom_temp_temperature
                    - sensor.master_bedroom_temp_humidity
                    - sensor.baby_room_temp_temperature
                    - sensor.baby_room_temp_humidity
                    - sensor.kitchen_temp_temperature
                    - sensor.kitchen_temp_humidity
                  tap_action: more-info

                - entities:
                    - light.family_room_main
                    - light.kitchen_table
                    - light.kitchen_main
                    - light.kitchen_cabinet
                    - light.kitchen_sink
                    - light.entrance_main
                    - light.entrance_stairs
                    - light.entrance_group
                  tap_action: false
                  state_action:
                    service: floorplan.class_set
                    service_data: '${(entity.state === "on") ? "light-on" : "light-off"}'

                - entities:
                    - light.family_room_main
                    - light.kitchen_table
                    - light.kitchen_main
                    - light.kitchen_cabinet
                    - light.kitchen_sink
                    - light.entrance_main
                    - light.entrance_stairs
                    - light.entrance_group
                  tap_action: toggle
                  double_tap_action: more-info
                  state_action:
                    action: call-service
                    service: floorplan.style_set
                    service_data:
                      element: "${entity.entity_id.replace('light.', 'light_overlay.')}"
                      style: |
                        >
                        if( entity.state !== "on" )
                            return "display: none;";
                        return "display: block;"


                - entity: light.kitchen_main
                  hold_action:
                    action: call-service
                    service: honeycomb
                    service_data:
                      entity: light.kitchen_main
                      buttons:
                        - icon: 'mdi:information-variant'
                          tap_action:
                            action: more-info
                        - icon: 'mdi:lightbulb'
                          active: true
                          tap_action:
                            action: toggle
                      xy_pad:
                        "y":
                          service: light.turn_on
                          repeat: 100
                          invert: true
                          data:
                            entity_id: entity
                            brightness_step_pct: "HCJS: return variables.y_percentage / 10;"


                - entity: light.family_room_main
                  hold_action:
                    action: call-service
                    service: honeycomb
                    service_data:
                      entity: light.family_room_main
                      buttons:
                        - icon: 'mdi:information-variant'
                          tap_action:
                            action: more-info
                        - icon: 'mdi:lightbulb'
                          active: true
                          tap_action:
                            action: toggle
                        - icon: 'mdi:pine-tree'
                          active: true
                          entity: switch.switch_4_switch
                          tap-action:
                            action: toggle
                      xy_pad:
                        "y":
                          service: light.turn_on
                          repeat: 100
                          invert: true
                          data:
                            entity_id: entity
                            brightness_step_pct: "HCJS: return variables.y_percentage / 10;"

                - entity: light.kitchen_table
                  hold_action:
                    action: call-service
                    service: honeycomb
                    service_data:
                      entity: light.kitchen_table
                      buttons:
                        - icon: 'mdi:information-variant'
                          tap_action:
                            action: more-info
                        - icon: 'mdi:lightbulb'
                          active: true
                          tap_action:
                            action: toggle
                      xy_pad:
                        "y":
                          service: light.turn_on
                          repeat: 100
                          invert: true
                          data:
                            entity_id: entity
                            brightness_step_pct: "HCJS: return variables.y_percentage / 10;"

        #################################################
        # Sonos
        #################################################
          - type: custom:mod-card
            card_mod:
              style: |
                :host {
                  --vertical-stack-card-margin: 5px;
                  transform: translate( 0, 0 );
                  top: calc( var(--header-height) + 5px );
                  right: 6px;
                  position: absolute;
                  width: 265px;
                  height: auto !important;
                }
            card:
              type: vertical-stack
              cards:
                - type: custom:mini-media-player
                  card_mod:
                    style: |
                      :host {
                        opacity: 1;
                        mix-blend-mode: luminosity;
                        --primary-text-color:rgb(36, 35, 35);
                      }
                  hide:
                    volume: false
                    power: true
                    source: true
                  group: true
                  entity: media_player.sonos
                  icon: mdi:speaker
                  tap_action:
                    action: call-service
                    service: honeycomb
                    service_data:
                      entity: media_player.sonos
                      active: true
                      buttons:
                        - icon: 'mdi:information-variant'
                          position: 0
                          tap_action:
                            action: more-info
                        - icon: 'mdi:volume-mute'
                          active: true
                          position: 1
                          entity: media_player.sonos
                          tap_action:
